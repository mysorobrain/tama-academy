name: CI

on:
  push:
    branches: [main]
  # Trigger sur toute PR ouverte vers n'importe quelle branche du repo (pas
  # juste main). Nécessaire pour les PRs stackées (ex: PR #2 sur PR #1) :
  # le CI doit valider la branche enfant même si elle ne cible pas main
  # directement.
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  CI: true
  # Placeholders pour le build CI (jamais une connexion réelle n'est tentée).
  # postgres.js ne se connecte qu'à la première requête → build ok.
  # Toute requête à la BDD en CI échouerait avec une erreur claire, ce qui
  # est le comportement souhaité (les tests E2E actuels ne touchent pas la DB).
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:6543/placeholder
  DATABASE_DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  quality:
    name: Quality (lint + typecheck + unit + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Upload .next cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: next-build
          path: .next/
          retention-days: 1
          if-no-files-found: warn

  e2e:
    name: E2E (Playwright chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
